global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: evercurrent-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: api

  - job_name: evercurrent-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["worker:9100"]
        labels:
          service: worker

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
