name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-api:
    name: lint-api (ruff + ty)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: apps/api/uv.lock
      - run: uv sync --frozen --no-install-project
      - run: uv run ruff format --check
      - run: uv run ruff check
      - run: uv run ty check

  lint-web:
    name: lint-web (eslint + prettier + tsc)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: "25"
          cache: "pnpm"
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm typecheck

  test-api:
    name: test-api (pytest unit + evals smoke)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: evercurrent
          POSTGRES_PASSWORD: evercurrent
          POSTGRES_DB: evercurrent
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U evercurrent"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:8-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://evercurrent:evercurrent@localhost:5432/evercurrent
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: apps/api/uv.lock
      - run: uv sync --frozen
      - name: Apply migrations
        run: uv run alembic upgrade head
      - name: ORM/schema drift check
        run: uv run python -m evercurrent.db.schema_check
      - name: Unit tests (health + ready only by policy)
        run: |
          if [ -d tests/unit ]; then
            uv run pytest tests/unit -v
          else
            echo "tests/unit not yet present; skipping per phase progression."
          fi

  build-api:
    name: build-api (docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    name: build-web (docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          file: ./apps/web/Dockerfile
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
