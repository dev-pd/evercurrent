worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'urt=$upstream_response_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    gzip              on;
    gzip_min_length   1024;
    gzip_types        text/plain text/css application/json application/javascript
                      text/xml application/xml application/xml+rss text/javascript
                      image/svg+xml;
    gzip_vary         on;

    # Proxy buffer / timeout defaults shared by both location blocks.
    # SSE streaming is enabled in the /api/agent/ block.
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    server {
        listen      80 default_server;
        server_name _;

        client_max_body_size 25m;

        # Docker's embedded DNS — re-resolve service IPs (valid=10s) so a
        # rebuilt api/web container (new IP) is picked up without an nginx
        # restart. Avoids the recurring "502 after rebuild".
        resolver 127.0.0.11 valid=10s ipv6=off;

        # Auth0 session/state cookies can be large; raise header buffers to
        # avoid "400 Request Header Or Cookie Too Large".
        large_client_header_buffers 16 64k;

        # The Auth0 callback sets a large Set-Cookie session header; raise the
        # upstream response buffers to avoid "upstream sent too big header" 502.
        proxy_buffer_size 64k;
        proxy_buffers 16 64k;
        proxy_busy_buffers_size 128k;

        # Realtime SSE channel for dashboard updates — disable proxy buffering
        # so events flush to the client in real time. Preserves /api/ prefix
        # so backend route /api/v1/events/stream matches.
        location /api/v1/events {
            set $up_api "api:8000";
            proxy_pass http://$up_api;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 1h;
            proxy_set_header Connection "";
            chunked_transfer_encoding off;
        }

        # Auth0 routes live in Next.js (handled by middleware), not FastAPI.
        # Must come before the generic /api/ block.
        location /api/auth/ {
            set $up_web "web:3000";
            proxy_pass http://$up_web;
        }

        # Next.js proxy route — attaches access token, forwards to FastAPI.
        # Must come before the generic /api/ block.
        location /api/proxy/ {
            set $up_web "web:3000";
            proxy_pass http://$up_web;
        }

        # All other backend traffic — preserve the /api/ prefix when proxying
        # (no trailing slash on proxy_pass).
        location /api/ {
            set $up_api "api:8000";
            proxy_pass http://$up_api;
        }

        # Frontend (Next.js). HMR/websocket upgrade in dev, plain HTTP in prod.
        location / {
            set $up_web "web:3000";
            proxy_pass http://$up_web;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
