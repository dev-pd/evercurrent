worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'urt=$upstream_response_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    gzip              on;
    gzip_min_length   1024;
    gzip_types        text/plain text/css application/json application/javascript
                      text/xml application/xml application/xml+rss text/javascript
                      image/svg+xml;
    gzip_vary         on;

    # Upstreams (docker-compose service names)
    upstream evercurrent_api {
        server api:8000;
        keepalive 32;
    }

    upstream evercurrent_web {
        server web:3000;
        keepalive 32;
    }

    # Proxy buffer / timeout defaults shared by both location blocks.
    # SSE streaming is enabled in the /api/agent/ block.
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    server {
        listen      80 default_server;
        server_name _;

        client_max_body_size 25m;

        # Agent SSE streaming endpoint — disable proxy buffering so events
        # flush to the client in real time.
        location /api/agent/ {
            proxy_pass http://evercurrent_api/agent/;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 1h;
            proxy_set_header Connection "";
            chunked_transfer_encoding off;
        }

        # Realtime SSE channel for dashboard updates. Same flushing rules
        # as the agent stream.
        location /api/events {
            proxy_pass http://evercurrent_api/events;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 1h;
            proxy_set_header Connection "";
            chunked_transfer_encoding off;
        }

        # All other backend traffic — strip the /api/ prefix when proxying.
        location /api/ {
            proxy_pass http://evercurrent_api/;
        }

        # Frontend (Next.js). HMR/websocket upgrade in dev, plain HTTP in prod.
        location / {
            proxy_pass http://evercurrent_web;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
