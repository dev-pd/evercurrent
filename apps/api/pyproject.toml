[project]
name = "evercurrent"
version = "0.1.0"
description = "EverCurrent backend: agentic AI layer for hardware engineering teams."
readme = "README.md"
requires-python = ">=3.13"
authors = [
    { name = "EverCurrent contributors" },
]
license = { text = "MIT" }

dependencies = [
    # Web framework + server
    "fastapi>=0.136.1,<0.137.0",
    "uvicorn[standard]",

    # Validation + settings
    "pydantic>=2.12",
    "pydantic-settings",

    # Database
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg",
    "alembic",
    "pgvector",

    # Job queue + cache
    "arq",
    "redis",

    # LLM + embeddings
    "anthropic",
    "voyageai",

    # Observability
    "structlog",
    "opentelemetry-sdk",
    "opentelemetry-api",
    "opentelemetry-instrumentation-fastapi",
    "opentelemetry-exporter-otlp",

    # HTTP + retry
    "httpx",
    "tenacity",

    # DI
    "dependency-injector",
]

[dependency-groups]
dev = [
    "ruff",
    "ty",
    "pytest",
    "pytest-asyncio",
    "pytest-cov",
    "pre-commit",
    "httpx",  # for TestClient
]

[build-system]
requires = ["uv_build>=0.11.12,<0.12.0"]
build-backend = "uv_build"

[tool.uv]
package = true

[tool.ruff]
target-version = "py313"
line-length = 100

[tool.ruff.lint]
# Light config for phase 0.1. Full ALL+ignores config lands in phase 0.3.
select = ["E", "F", "W", "I"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
