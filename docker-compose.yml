name: evercurrent

# Everything runs in docker. No service ports are bound to the host except
# nginx — all access goes through http://localhost:8080. Inter-service
# communication uses the docker network (service names as DNS).

services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: evercurrent
      POSTGRES_PASSWORD: evercurrent
      POSTGRES_DB: evercurrent
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evercurrent -d evercurrent"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    volumes:
      - redis_data:/data
    expose:
      - "6379"

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://evercurrent:evercurrent@postgres:5432/evercurrent}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    # Bind mounts for dev — host edits propagate into the container so ruff
    # --fix / pytest changes land on disk without a rebuild. The image still
    # copies the same paths at build time so it stays portable.
    volumes:
      - ./apps/api/src:/app/src
      - ./apps/api/tests:/app/tests
      - ./apps/api/alembic:/app/alembic
      - ./apps/api/alembic.ini:/app/alembic.ini
      - ./apps/api/seed_data:/app/seed_data
      - ./apps/api/pyproject.toml:/app/pyproject.toml

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["arq", "evercurrent.jobs.worker.WorkerSettings"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://evercurrent:evercurrent@postgres:5432/evercurrent}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/src
      - ./apps/api/seed_data:/app/seed_data

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    depends_on:
      - api
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

  # `web-dev` runs the same image at the builder target (with all node_modules
  # + source). It is not started by default; use `docker compose --profile dev
  # up web-dev` or `docker compose run --rm web-dev pnpm lint`.
  web-dev:
    profiles: ["dev"]
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: dev
    working_dir: /app
    command: ["pnpm", "dev"]
    environment:
      NODE_ENV: development
    # Mount the whole host source tree over /app, preserve the image's
    # node_modules with a named volume so they survive across runs.
    volumes:
      - ./apps/web:/app
      - web_dev_node_modules:/app/node_modules
      - web_dev_next:/app/.next

volumes:
  postgres_data:
  redis_data:
  web_dev_node_modules:
  web_dev_next:
