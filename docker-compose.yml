name: evercurrent

services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: evercurrent
      POSTGRES_PASSWORD: evercurrent
      POSTGRES_DB: evercurrent
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evercurrent -d evercurrent"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    expose:
      - "5432"
    ports:
      - "55432:5432"

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    volumes:
      - redis_data:/data
    expose:
      - "6379"

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://evercurrent:evercurrent@postgres:5432/evercurrent}
      APP_DATABASE_URL: ${APP_DATABASE_URL:-postgresql+asyncpg://app_rw:app_rw@postgres:5432/evercurrent}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      APP_BASE_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:8080}
      AUTH0_DOMAIN: ${AUTH0_DOMAIN:-}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE:-}
      AUTH0_WEBHOOK_SECRET: ${AUTH0_WEBHOOK_SECRET:-}
      SLACK_CLIENT_ID: ${SLACK_CLIENT_ID:-}
      SLACK_CLIENT_SECRET: ${SLACK_CLIENT_SECRET:-}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
      SLACK_DEMO_BOT_TOKEN: ${SLACK_DEMO_BOT_TOKEN:-}
      SLACK_WORKSPACE_DOMAIN: ${SLACK_WORKSPACE_DOMAIN:-}
      DEMO_CHATTER_ENABLED: ${DEMO_CHATTER_ENABLED:-false}
      DEMO_CHATTER_INTERVAL_SECONDS: ${DEMO_CHATTER_INTERVAL_SECONDS:-600}
      DROPBOX_CLIENT_ID: ${DROPBOX_CLIENT_ID:-}
      DROPBOX_CLIENT_SECRET: ${DROPBOX_CLIENT_SECRET:-}
      DROPBOX_REDIRECT_URI: ${DROPBOX_REDIRECT_URI:-http://localhost:8080/api/v1/connectors/dropbox/oauth/callback}
      CONNECTOR_SECRET_KEY: ${CONNECTOR_SECRET_KEY:-}
      WEBHOOK_PUBLIC_URL: ${WEBHOOK_PUBLIC_URL:-}
      FERNET_KEY: ${FERNET_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - ./apps/api/src:/app/src
      - ./apps/api/tests:/app/tests
      - ./apps/api/alembic:/app/alembic
      - ./apps/api/alembic.ini:/app/alembic.ini
      - ./apps/api/pyproject.toml:/app/pyproject.toml

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    command:
      [
        "celery",
        "-A",
        "evercurrent.jobs.celery_app",
        "worker",
        "--loglevel=info",
        "--concurrency=4",
      ]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "celery -A evercurrent.jobs.celery_app inspect ping -t 5 >/dev/null 2>&1 || exit 1",
        ]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://evercurrent:evercurrent@postgres:5432/evercurrent}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      AUTH0_DOMAIN: ${AUTH0_DOMAIN:-}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE:-}
      AUTH0_WEBHOOK_SECRET: ${AUTH0_WEBHOOK_SECRET:-}
      SLACK_CLIENT_ID: ${SLACK_CLIENT_ID:-}
      SLACK_CLIENT_SECRET: ${SLACK_CLIENT_SECRET:-}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
      SLACK_DEMO_BOT_TOKEN: ${SLACK_DEMO_BOT_TOKEN:-}
      DEMO_CHATTER_ENABLED: ${DEMO_CHATTER_ENABLED:-false}
      DEMO_CHATTER_INTERVAL_SECONDS: ${DEMO_CHATTER_INTERVAL_SECONDS:-600}
      DROPBOX_CLIENT_ID: ${DROPBOX_CLIENT_ID:-}
      DROPBOX_CLIENT_SECRET: ${DROPBOX_CLIENT_SECRET:-}
      DROPBOX_REDIRECT_URI: ${DROPBOX_REDIRECT_URI:-http://localhost:8080/api/v1/connectors/dropbox/oauth/callback}
      CONNECTOR_SECRET_KEY: ${CONNECTOR_SECRET_KEY:-}
      WEBHOOK_PUBLIC_URL: ${WEBHOOK_PUBLIC_URL:-}
      FERNET_KEY: ${FERNET_KEY:-}
      PROMETHEUS_MULTIPROC_DIR: /tmp/prom_mp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/src
  beat:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    command:
      [
        "celery",
        "-A",
        "evercurrent.jobs.celery_app",
        "beat",
        "--loglevel=info",
        "--schedule=/tmp/celerybeat-schedule",
      ]
    healthcheck:
      disable: true
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://evercurrent:evercurrent@postgres:5432/evercurrent}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      AUTH0_DOMAIN: ${AUTH0_DOMAIN:-}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE:-}
      AUTH0_WEBHOOK_SECRET: ${AUTH0_WEBHOOK_SECRET:-}
      SLACK_CLIENT_ID: ${SLACK_CLIENT_ID:-}
      SLACK_CLIENT_SECRET: ${SLACK_CLIENT_SECRET:-}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
      SLACK_DEMO_BOT_TOKEN: ${SLACK_DEMO_BOT_TOKEN:-}
      DEMO_CHATTER_ENABLED: ${DEMO_CHATTER_ENABLED:-false}
      DEMO_CHATTER_INTERVAL_SECONDS: ${DEMO_CHATTER_INTERVAL_SECONDS:-600}
      DROPBOX_CLIENT_ID: ${DROPBOX_CLIENT_ID:-}
      DROPBOX_CLIENT_SECRET: ${DROPBOX_CLIENT_SECRET:-}
      DROPBOX_REDIRECT_URI: ${DROPBOX_REDIRECT_URI:-http://localhost:8080/api/v1/connectors/dropbox/oauth/callback}
      CONNECTOR_SECRET_KEY: ${CONNECTOR_SECRET_KEY:-}
      WEBHOOK_PUBLIC_URL: ${WEBHOOK_PUBLIC_URL:-}
      FERNET_KEY: ${FERNET_KEY:-}
    depends_on:
      redis:
        condition: service_healthy
      worker:
        condition: service_started
    volumes:
      - ./apps/api/src:/app/src

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NODE_OPTIONS: ${NODE_OPTIONS:---max-http-header-size=65536}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:8080}
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://api:8000}
      AUTH0_DOMAIN: ${AUTH0_DOMAIN:-}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE:-}
      AUTH0_ORG_ID: ${AUTH0_ORG_ID:-}
      AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID:-}
      AUTH0_CLIENT_SECRET: ${AUTH0_CLIENT_SECRET:-}
      AUTH0_SECRET: ${AUTH0_SECRET:-}
    depends_on:
      - api
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

  web-dev:
    profiles: ["dev"]
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: dev
    working_dir: /app
    command: ["pnpm", "dev"]
    environment:
      NODE_ENV: development
    volumes:
      - ./apps/web:/app
      - web_dev_node_modules:/app/node_modules
      - web_dev_next:/app/.next

  prometheus:
    profiles: ["monitor"]
    image: prom/prometheus:v3.0.1
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"

  loki:
    profiles: ["monitor"]
    image: grafana/loki:3.3.2
    restart: unless-stopped
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - loki_data:/loki
    ports:
      - "3110:3100"

  promtail:
    profiles: ["monitor"]
    image: grafana/promtail:3.3.2
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./monitoring/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
    command: ["-config.file=/etc/promtail/promtail.yml"]
    depends_on:
      - loki

  grafana:
    profiles: ["monitor"]
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3030:3000"
    depends_on:
      - prometheus
      - loki

volumes:
  postgres_data:
  redis_data:
  web_dev_node_modules:
  web_dev_next:
  prometheus_data:
  loki_data:
  grafana_data:
